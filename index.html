<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self'; script-src 'self'; img-src 'self' data:; connect-src 'self';" />
  <title>帮助文档 · uuk.me</title>
  <meta name="description" content="个人帮助文档中心 — 记录使用说明与操作指南" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ===== Login Overlay ===== -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="login-logo">D</div>
    <div class="login-title">帮助文档</div>
    <div class="login-sub">uuk.me · 个人知识库</div>
    <form id="loginForm" novalidate>
      <input class="login-input" id="loginPassword" type="password"
             placeholder="请输入访问密码" autocomplete="current-password" />
      <button class="login-btn" id="loginBtn" type="submit">登 录</button>
    </form>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- Sidebar overlay (mobile) -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- Sidebar -->
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">D</div>
      <div>
        <div class="logo-text">帮助文档</div>
        <div class="logo-sub">uuk.me · 个人知识库</div>
      </div>
    </div>

    <div class="sidebar-search">
      <input type="text" id="searchInput" placeholder="搜索文档…" />
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-title">分类</div>
      <div id="categoryList"></div>
    </div>

    <button class="add-cat-btn" id="addCatBtn">＋ 新建分类</button>

    <div class="sidebar-footer">
      © 2025 uuk.me · 个人专用
      &nbsp;·&nbsp;
      <button id="logoutBtn" class="logout-btn">退出登录</button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="hamburger" id="hamburgerBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="3" y1="6"  x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div class="topbar-title">帮助文档 <span id="currentCatName"></span></div>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-secondary" id="exportBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span>导出</span>
        </button>
        <button class="btn btn-primary" id="addDocBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span>新建文档</span>
        </button>
      </div>
    </header>

    <!-- Content -->
    <div class="content">
      <!-- Stats -->
      <div class="stats-bar" id="statsBar">
        <div class="stat-card">
          <div class="stat-icon blue">📄</div>
          <div>
            <div class="stat-label">全部文档</div>
            <div class="stat-value" id="statTotal">0</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon purple">🗂️</div>
          <div>
            <div class="stat-label">分类数量</div>
            <div class="stat-value" id="statCats">0</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green">✅</div>
          <div>
            <div class="stat-label">本月新增</div>
            <div class="stat-value" id="statMonth">0</div>
          </div>
        </div>
      </div>

      <!-- Docs section -->
      <div class="section-header">
        <div class="section-title">
          <span id="sectionTitle">所有文档</span>
          <span class="badge" id="sectionBadge">0</span>
        </div>
      </div>

      <div class="docs-grid" id="docsGrid"></div>
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">📭</div>
        <h3>暂无文档</h3>
        <p>点击右上角「新建文档」开始添加你的第一篇帮助文档</p>
      </div>
    </div>
  </div>
</div>

<!-- ===== Add / Edit Modal ===== -->
<div class="modal-overlay" id="docModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">新建文档</div>
      <button class="modal-close" data-close-modal="docModal">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">标题 <span class="req">*</span></label>
        <input class="form-control" id="docTitle" type="text" placeholder="输入文档标题" maxlength="100" />
      </div>
      <div class="form-group">
        <label class="form-label">分类 <span class="req">*</span></label>
        <select class="form-control" id="docCategory"></select>
      </div>
      <div class="form-group">
        <label class="form-label">内容 <span class="req">*</span></label>
        <textarea class="form-control doc-content-textarea" id="docContent" placeholder="输入文档内容，支持换行…"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">图片（可选）</label>
        <div class="img-upload-wrap">
          <label class="btn btn-secondary img-file-label" for="imgFileInput">📁 选择图片</label>
          <input type="file" id="imgFileInput" accept="image/*" class="img-file-input" />
          <button class="btn btn-secondary" id="clearImgBtn" type="button">✕ 移除</button>
        </div>
        <div id="imgPreview" class="img-preview-wrap"></div>
        <div class="img-hint">支持 JPG / PNG / GIF / WebP，建议 1 MB 以内；图片以 Base64 格式存储于本地</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-close-modal="docModal">取消</button>
      <button class="btn btn-primary" id="saveDocBtn">保存文档</button>
    </div>
  </div>
</div>

<!-- ===== Detail Modal ===== -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="detailTitle"></div>
      <button class="modal-close" data-close-modal="detailModal">✕</button>
    </div>
    <div class="modal-body">
      <div class="detail-tag-wrap">
        <span class="doc-card-tag" id="detailTag"></span>
      </div>
      <div id="detailImageWrap" class="detail-image-wrap"></div>
      <div class="detail-content" id="detailContent"></div>
      <div class="detail-meta" id="detailMeta"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-close-modal="detailModal">关闭</button>
      <button class="btn btn-primary" id="detailEditBtn">编辑</button>
    </div>
  </div>
</div>

<!-- ===== Confirm Modal ===== -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal confirm-modal">
    <div class="confirm-icon">🗑️</div>
    <div class="confirm-title">确认删除</div>
    <div class="confirm-text" id="confirmText">确定要删除这篇文档吗？此操作不可撤销。</div>
    <div class="modal-footer modal-footer-center">
      <button class="btn btn-secondary" data-close-modal="confirmModal">取消</button>
      <button class="btn btn-danger" id="confirmOkBtn">确认删除</button>
    </div>
  </div>
</div>

<!-- ===== Add Category Modal ===== -->
<div class="modal-overlay" id="catModal">
  <div class="modal modal-sm">
    <div class="modal-header">
      <div class="modal-title">新建分类</div>
      <button class="modal-close" data-close-modal="catModal">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">分类名称 <span class="req">*</span></label>
        <input class="form-control" id="catName" type="text" placeholder="输入分类名称" maxlength="30" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-close-modal="catModal">取消</button>
      <button class="btn btn-primary" id="saveCatBtn">创建分类</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script src="app.js"></script>
</body>
</html>
